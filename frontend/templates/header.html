
{{#loggedin}}
<div id="links">
    <div class="logo">
        <img src="/images/logo.svg" alt="videogamestore logo">
        <span class="logo-text">Video Game Store</span>
    </div>
    <a href="#" onclick="loadHome()">Home</a>
    <a href="#" onclick="editProfile()">Profile</a>
    <a href="#" onclick="showCart()">View Cart</a>
</div>

<div>
    Welcome&nbsp;<span style="font-weight: bold">{{username}}</span>&nbsp;|&nbsp;<a href="#" onclick="userService.logout();return false;">logout</a>
    <div class="cart" onclick="showCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <div id="cart-items">0</div>
    </div>
</div>
{{/loggedin}}
{{#loggedout}}
<div id="links">
    <div class="logo">
        <img src="images/logo.svg" alt="videogamestore logo" onerror="this.style.display='none'">
        <span class="logo-text">Video Game Store</span>
    </div>
    <a href="#" onclick="loadHome()">Home</a>
</div>

<div class="auth-links">
    <a href="#" onclick="showLoginForm();return false;">Login</a>
    <a href="#" onclick="showRegisterForm();return false;">Register</a>
</div>
{{/loggedout}}
